syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.example.sep3.grpc";
option java_outer_classname = "BusinessServiceProto";

package proto;

service BusinessService {
  rpc RegisterBusiness(RegisterBusinessRequest) returns (RegisterBusinessResponse);
  rpc GetBusinessByEmail(LoginBusinessRequest) returns (BusinessResponse);
}

message LoginBusinessRequest {
  string email = 1;
  string password = 2;
}

message BusinessResponse {
  string businessId = 1;
  string businessName = 2;
  string email = 3;
  string phoneNumber = 4;
  string cvr = 5;
  string logoPath = 6;
  string hashedPassword = 7;
  Address address = 8;
  string role = 9;
}

message RegisterBusinessRequest {
  string businessName = 1;
  string email = 2;
  string phoneNumber = 3;
  string cvr = 4;
  string logoPath = 5;
  string hashedPassword = 6;
  Address address = 7;
  string role = 8;
}

message RegisterBusinessResponse {
  string businessId = 1;
  string email = 2;
  string role = 3;
}

message Address{
  string street = 1;
  string number = 2;
  string city = 3;
  string county = 4;
  string state = 5;
  string country = 6;
  string postalCode = 7;
}





